<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Replay Watcher</title>
	<style>
		body { margin: 0; background: #0e1118; color: #eaf0ff; font: 14px/1.4 system-ui, sans-serif; }
		.wrap { max-width: 980px; margin: 18px auto; padding: 0 14px; }
		.panel { background: #131925; border: 1px solid #273146; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
		.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
		button, input[type="text"], textarea, input[type="range"] {
			font: inherit;
			color: #eaf0ff;
			background: #0e141f;
			border: 1px solid #2a354a;
			border-radius: 8px;
			padding: 8px 10px;
		}
		button { cursor: pointer; background: #1d4ed8; border-color: #1d4ed8; }
		textarea { width: 100%; min-height: 76px; box-sizing: border-box; }
		canvas { width: 100%; height: auto; border-radius: 8px; border: 1px solid #2a354a; background: #0a0f17; }
		#stats-graph { height: 220px; }
		.meta { opacity: 0.85; }
		.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; color: #bfd0ef; }
		.swatch { display: inline-block; width: 10px; height: 10px; border-radius: 999px; margin-right: 6px; vertical-align: middle; }
		#stats-now { margin-top: 6px; font-size: 12px; color: #9fd0ff; }
		.metric-toggle { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
		.metric-toggle input { margin: 0; accent-color: #60a5fa; }
		#realtime-video-canvas { height: 280px; }
		#realtime-video-note { margin-top: 6px; font-size: 12px; color: #9fb5d8; }
	</style>
</head>
<body>
	<div class="wrap">
		<div class="panel">
			<div class="controls">
				<button id="load-code">Load Ghost Code</button>
				<button id="play-pause">Play</button>
				<button id="open-race">Open Race URL</button>
				<div id="status" class="meta">No replay loaded.</div>
			</div>
			<div style="margin-top:8px">
				<textarea id="ghost-code" placeholder="Paste exported ghost code here..."></textarea>
			</div>
			<div style="margin-top:8px">
				<input id="timeline" type="range" min="0" max="1000" value="0" style="width:100%">
			</div>
		</div>

		<div class="panel">
			<canvas id="replay-canvas" width="1280" height="720"></canvas>
		</div>
		<div class="panel">
			<div class="meta">Car stats over time (derived from ghost samples)</div>
			<canvas id="stats-graph" width="1280" height="320"></canvas>
			<div class="legend">
				<label class="metric-toggle"><input id="metric-speed" data-metric="speed" type="checkbox" checked><span class="swatch" style="background:#67e8f9"></span>Speed</label>
				<label class="metric-toggle"><input id="metric-accel" data-metric="accel" type="checkbox" checked><span class="swatch" style="background:#f59e0b"></span>Acceleration</label>
				<label class="metric-toggle"><input id="metric-yaw-rate" data-metric="yawRate" type="checkbox" checked><span class="swatch" style="background:#a78bfa"></span>Yaw rate</label>
				<label class="metric-toggle"><input id="metric-height" data-metric="height" type="checkbox" checked><span class="swatch" style="background:#4ade80"></span>Ride height</label>
			</div>
			<div id="stats-now">Load a replay to inspect telemetry.</div>
		</div>
		<div class="panel">
			<div class="meta">Realtime video (experimental)</div>
			<canvas id="realtime-video-canvas" width="1280" height="720"></canvas>
			<div id="realtime-video-note">Follow-camera style preview using ghost + track data.</div>
		</div>
	</div>

	<script>
		function decodeBase64UrlJson( value ) {
			const normalized = value.replace( /-/g, '+' ).replace( /_/g, '/' );
			const padLen = ( 4 - normalized.length % 4 ) % 4;
			const padded = normalized + '='.repeat( padLen );
			return JSON.parse( decodeURIComponent( escape( atob( padded ) ) ) );
		}

		const TYPE_NAMES = [ 'track-straight', 'track-corner', 'track-checkpoint', 'track-finish' ];
		const ORIENT_TO_GODOT = [ 0, 16, 10, 22 ];

		function decodeMapCells( mapStr ) {
			if ( ! mapStr ) return [];
			const base64 = mapStr.replace( /-/g, '+' ).replace( /_/g, '/' );
			const binary = atob( base64 );
			const bytes = new Uint8Array( binary.length );
			for ( let i = 0; i < binary.length; i ++ ) bytes[ i ] = binary.charCodeAt( i );

			const cells = [];
			for ( let i = 0; i + 2 < bytes.length; i += 3 ) {
				const gx = bytes[ i ] - 128;
				const gz = bytes[ i + 1 ] - 128;
				const packed = bytes[ i + 2 ];
				const ti = ( packed >> 2 ) & 0x03;
				const oi = packed & 0x03;
				cells.push( [ gx, gz, TYPE_NAMES[ ti ], ORIENT_TO_GODOT[ oi ] ] );
			}

			return cells;
		}

		function decodeMods( modsStr ) {
			if ( ! modsStr ) return { b: [], j: [], s: [], u: [], d: [], w: { preset: 'clear', precipitation: 'none', intensity: 'medium', lightning: false, wind: 'none' } };
			try {
				const payload = decodeURIComponent( escape( atob( modsStr.replace( /-/g, '+' ).replace( /_/g, '/' ) ) ) );
				const parsed = JSON.parse( payload );
				return {
					b: Array.isArray( parsed.b ) ? parsed.b : [],
					j: Array.isArray( parsed.j ) ? parsed.j : [],
					s: Array.isArray( parsed.s ) ? parsed.s : [],
					u: Array.isArray( parsed.u ) ? parsed.u : [],
					d: Array.isArray( parsed.d ) ? parsed.d : [],
					w: {
						preset: typeof parsed?.w?.preset === 'string' ? parsed.w.preset : 'clear',
						precipitation: typeof parsed?.w?.precipitation === 'string' ? parsed.w.precipitation : 'none',
						intensity: typeof parsed?.w?.intensity === 'string' ? parsed.w.intensity : 'medium',
						lightning: Boolean( parsed?.w?.lightning ),
						wind: typeof parsed?.w?.wind === 'string' ? parsed.w.wind : 'none',
					},
				};
			} catch ( e ) {
				return { b: [], j: [], s: [], u: [], d: [], w: { preset: 'clear', precipitation: 'none', intensity: 'medium', lightning: false, wind: 'none' } };
			}
		}

		const codeInput = document.getElementById( 'ghost-code' );
		const loadBtn = document.getElementById( 'load-code' );
		const playBtn = document.getElementById( 'play-pause' );
		const openRaceBtn = document.getElementById( 'open-race' );
		const statusEl = document.getElementById( 'status' );
		const timeline = document.getElementById( 'timeline' );
		const canvas = document.getElementById( 'replay-canvas' );
		const ctx = canvas.getContext( '2d' );
		const statsCanvas = document.getElementById( 'stats-graph' );
		const statsCtx = statsCanvas.getContext( '2d' );
		const statsNowEl = document.getElementById( 'stats-now' );
		const realtimeVideoCanvas = document.getElementById( 'realtime-video-canvas' );
		const realtimeVideoCtx = realtimeVideoCanvas.getContext( '2d' );
		const metricToggleInputs = Array.from( document.querySelectorAll( 'input[data-metric]' ) );

		let replay = null;
		let isPlaying = false;
		let playStartMs = 0;
		let pausedAt = 0;
		let replayTrack = null;
		let telemetry = null;
		let metricVisibility = {
			speed: true,
			accel: true,
			yawRate: true,
			height: true,
		};

		function readCodeFromHash() {
			const hash = new URLSearchParams( location.hash.startsWith( '#' ) ? location.hash.slice( 1 ) : location.hash );
			return hash.get( 'code' ) || '';
		}

		function getSampleAtTime( samples, t ) {
			if ( ! samples || samples.length === 0 ) return null;
			if ( t <= samples[ 0 ].t ) return samples[ 0 ];
			for ( let i = 1; i < samples.length; i ++ ) {
				const b = samples[ i ];
				if ( b.t >= t ) {
					const a = samples[ i - 1 ];
					const span = Math.max( 1e-4, b.t - a.t );
					const alpha = Math.max( 0, Math.min( 1, ( t - a.t ) / span ) );
					return {
						x: a.x + ( b.x - a.x ) * alpha,
						y: a.y + ( b.y - a.y ) * alpha,
						z: a.z + ( b.z - a.z ) * alpha,
						yaw: a.yaw + ( b.yaw - a.yaw ) * alpha,
					};
				}
			}
			return samples[ samples.length - 1 ];
		}

		function fitBounds( samples ) {
			let minX = Infinity, maxX = - Infinity, minZ = Infinity, maxZ = - Infinity;
			for ( const s of samples ) {
				minX = Math.min( minX, s.x );
				maxX = Math.max( maxX, s.x );
				minZ = Math.min( minZ, s.z );
				maxZ = Math.max( maxZ, s.z );
			}
			if ( ! Number.isFinite( minX ) ) return { minX: -10, maxX: 10, minZ: -10, maxZ: 10 };
			const pad = 4;
			return { minX: minX - pad, maxX: maxX + pad, minZ: minZ - pad, maxZ: maxZ + pad };
		}

		function wrapAngleDiff( a, b ) {
			let diff = b - a;
			while ( diff > Math.PI ) diff -= Math.PI * 2;
			while ( diff < - Math.PI ) diff += Math.PI * 2;
			return diff;
		}

		function buildTelemetry( samples ) {
			if ( ! Array.isArray( samples ) || samples.length < 2 ) return null;
			const points = [];
			for ( let i = 0; i < samples.length; i ++ ) {
				const current = samples[ i ];
				const prev = samples[ Math.max( 0, i - 1 ) ];
				const dt = Math.max( 1e-4, ( current.t ?? 0 ) - ( prev.t ?? 0 ) );
				const dx = ( current.x ?? 0 ) - ( prev.x ?? 0 );
				const dz = ( current.z ?? 0 ) - ( prev.z ?? 0 );
				const speed = Math.hypot( dx, dz ) / dt;
				const yawRate = i === 0 ? 0 : Math.abs( wrapAngleDiff( prev.yaw ?? 0, current.yaw ?? 0 ) ) / dt;
				points.push( {
					t: Number( current.t ) || 0,
					speed,
					height: Number( current.y ) || 0,
					yawRate,
					accel: 0,
				} );
			}
			for ( let i = 1; i < points.length; i ++ ) {
				const dt = Math.max( 1e-4, points[ i ].t - points[ i - 1 ].t );
				points[ i ].accel = ( points[ i ].speed - points[ i - 1 ].speed ) / dt;
			}
			return {
				points,
				ranges: {
					speed: computeRange( points.map( ( point ) => point.speed ) ),
					accel: computeRange( points.map( ( point ) => point.accel ) ),
					yawRate: computeRange( points.map( ( point ) => point.yawRate ) ),
					height: computeRange( points.map( ( point ) => point.height ) ),
				},
			};
		}

		function computeRange( values ) {
			let min = Infinity;
			let max = - Infinity;
			for ( const value of values ) {
				if ( ! Number.isFinite( value ) ) continue;
				min = Math.min( min, value );
				max = Math.max( max, value );
			}
			if ( ! Number.isFinite( min ) || ! Number.isFinite( max ) ) return { min: 0, max: 1 };
			if ( Math.abs( max - min ) < 1e-5 ) return { min: min - 1, max: max + 1 };
			return { min, max };
		}

		function getTelemetryAtTime( t ) {
			if ( ! telemetry?.points?.length ) return null;
			const points = telemetry.points;
			if ( t <= points[ 0 ].t ) return points[ 0 ];
			for ( let i = 1; i < points.length; i ++ ) {
				if ( points[ i ].t >= t ) return points[ i ];
			}
			return points[ points.length - 1 ];
		}

		function drawTelemetryGraph( nowT ) {
			statsCtx.clearRect( 0, 0, statsCanvas.width, statsCanvas.height );
			statsCtx.fillStyle = '#0a0f17';
			statsCtx.fillRect( 0, 0, statsCanvas.width, statsCanvas.height );
			if ( ! telemetry?.points?.length || ! replay?.ghost?.duration ) {
				statsCtx.fillStyle = '#93a5c2';
				statsCtx.font = '500 16px system-ui, sans-serif';
				statsCtx.fillText( 'No telemetry data.', 18, 30 );
				return;
			}

			const points = telemetry.points;
			const duration = Math.max( 1e-4, Number( replay.ghost.duration ) || points[ points.length - 1 ].t );
			const pad = { l: 52, r: 18, t: 20, b: 32 };
			const plotW = statsCanvas.width - pad.l - pad.r;
			const plotH = statsCanvas.height - pad.t - pad.b;
			const toX = ( t ) => pad.l + ( Math.max( 0, Math.min( duration, t ) ) / duration ) * plotW;
			const toY = ( value, range ) => {
				const span = Math.max( 1e-6, range.max - range.min );
				const alpha = ( value - range.min ) / span;
				return pad.t + ( 1 - alpha ) * plotH;
			};

			statsCtx.strokeStyle = 'rgba(80,101,138,0.45)';
			statsCtx.lineWidth = 1;
			statsCtx.strokeRect( pad.l, pad.t, plotW, plotH );
			for ( let i = 0; i <= 4; i ++ ) {
				const y = pad.t + ( i / 4 ) * plotH;
				statsCtx.beginPath();
				statsCtx.moveTo( pad.l, y );
				statsCtx.lineTo( pad.l + plotW, y );
				statsCtx.stroke();
			}

			if ( metricVisibility.speed ) drawMetricLine( points, ( point ) => point.speed, telemetry.ranges.speed, '#67e8f9', toX, toY );
			if ( metricVisibility.accel ) drawMetricLine( points, ( point ) => point.accel, telemetry.ranges.accel, '#f59e0b', toX, toY );
			if ( metricVisibility.yawRate ) drawMetricLine( points, ( point ) => point.yawRate, telemetry.ranges.yawRate, '#a78bfa', toX, toY );
			if ( metricVisibility.height ) drawMetricLine( points, ( point ) => point.height, telemetry.ranges.height, '#4ade80', toX, toY );

			const nowX = toX( nowT );
			statsCtx.strokeStyle = '#ffffff';
			statsCtx.lineWidth = 1.2;
			statsCtx.beginPath();
			statsCtx.moveTo( nowX, pad.t );
			statsCtx.lineTo( nowX, pad.t + plotH );
			statsCtx.stroke();

			statsCtx.fillStyle = '#9fb5d8';
			statsCtx.font = '12px system-ui, sans-serif';
			statsCtx.fillText( '0.00s', pad.l, statsCanvas.height - 10 );
			statsCtx.fillText( `${ duration.toFixed( 2 ) }s`, pad.l + plotW - 42, statsCanvas.height - 10 );

			const current = getTelemetryAtTime( nowT );
			if ( current && statsNowEl ) {
				const parts = [ `t=${ nowT.toFixed( 2 ) }s` ];
				if ( metricVisibility.speed ) parts.push( `speed ${ current.speed.toFixed( 2 ) }` );
				if ( metricVisibility.accel ) parts.push( `accel ${ current.accel.toFixed( 2 ) }` );
				if ( metricVisibility.yawRate ) parts.push( `yaw rate ${ current.yawRate.toFixed( 2 ) }` );
				if ( metricVisibility.height ) parts.push( `height ${ current.height.toFixed( 2 ) }` );
				if ( parts.length === 1 ) parts.push( 'all metrics hidden' );
				statsNowEl.textContent = parts.join( ' • ' );
			}
		}

		function drawMetricLine( points, getter, range, color, toX, toY ) {
			statsCtx.strokeStyle = color;
			statsCtx.lineWidth = 2;
			statsCtx.beginPath();
			for ( let i = 0; i < points.length; i ++ ) {
				const point = points[ i ];
				const x = toX( point.t );
				const y = toY( getter( point ), range );
				if ( i === 0 ) statsCtx.moveTo( x, y );
				else statsCtx.lineTo( x, y );
			}
			statsCtx.stroke();
		}

		function drawRealtimeVideo( nowT ) {
			realtimeVideoCtx.clearRect( 0, 0, realtimeVideoCanvas.width, realtimeVideoCanvas.height );
			realtimeVideoCtx.fillStyle = '#060a11';
			realtimeVideoCtx.fillRect( 0, 0, realtimeVideoCanvas.width, realtimeVideoCanvas.height );
			if ( ! replay?.ghost?.samples?.length ) {
				realtimeVideoCtx.fillStyle = '#9db1cf';
				realtimeVideoCtx.font = '600 22px system-ui, sans-serif';
				realtimeVideoCtx.fillText( 'Load a replay to preview realtime video.', 28, 44 );
				return;
			}

			const samples = replay.ghost.samples;
			const current = getSampleAtTime( samples, nowT );
			if ( ! current ) return;
			const yaw = Number( current.yaw ) || 0;
			const fwdX = Math.sin( yaw );
			const fwdZ = Math.cos( yaw );
			const camX = current.x + fwdX * 6;
			const camZ = current.z + fwdZ * 6;
			const camYaw = yaw;
			const scale = 18;
			const cx = realtimeVideoCanvas.width * 0.5;
			const cy = realtimeVideoCanvas.height * 0.72;

			const toCam = ( x, z ) => {
				const dx = x - camX;
				const dz = z - camZ;
				const localX = dx * Math.cos( - camYaw ) - dz * Math.sin( - camYaw );
				const localZ = dx * Math.sin( - camYaw ) + dz * Math.cos( - camYaw );
				return {
					x: cx + localX * scale,
					y: cy - localZ * scale,
				};
			};

			realtimeVideoCtx.fillStyle = '#0d1522';
			realtimeVideoCtx.fillRect( 0, realtimeVideoCanvas.height * 0.45, realtimeVideoCanvas.width, realtimeVideoCanvas.height * 0.55 );

			const cellSize = 9.99 * 0.75;
			if ( replayTrack?.cells?.length ) {
				for ( const [ gx, gz, tileType ] of replayTrack.cells ) {
					const color =
						tileType === 'track-finish' ? '#4ade80' :
						tileType === 'track-checkpoint' ? '#facc15' :
						tileType === 'track-corner' ? '#818cf8' :
						'#60a5fa';
					const p = toCam( gx * cellSize, gz * cellSize );
					realtimeVideoCtx.fillStyle = color;
					realtimeVideoCtx.fillRect( p.x, p.y - cellSize * scale, cellSize * scale, cellSize * scale );
				}
			}

			realtimeVideoCtx.strokeStyle = 'rgba(103,232,249,0.55)';
			realtimeVideoCtx.lineWidth = 2;
			realtimeVideoCtx.beginPath();
			for ( const sample of samples ) {
				if ( sample.t > nowT ) break;
				const p = toCam( sample.x, sample.z );
				if ( sample === samples[ 0 ] ) realtimeVideoCtx.moveTo( p.x, p.y );
				else realtimeVideoCtx.lineTo( p.x, p.y );
			}
			realtimeVideoCtx.stroke();

			const pCar = toCam( current.x, current.z );
			realtimeVideoCtx.fillStyle = '#67e8f9';
			realtimeVideoCtx.beginPath();
			realtimeVideoCtx.moveTo( pCar.x, pCar.y - 14 );
			realtimeVideoCtx.lineTo( pCar.x + 9, pCar.y + 10 );
			realtimeVideoCtx.lineTo( pCar.x - 9, pCar.y + 10 );
			realtimeVideoCtx.closePath();
			realtimeVideoCtx.fill();

			realtimeVideoCtx.fillStyle = '#d2ddf2';
			realtimeVideoCtx.font = '600 20px system-ui, sans-serif';
			realtimeVideoCtx.fillText( `Realtime video (experimental) • ${ nowT.toFixed( 2 ) }s`, 20, 34 );
			realtimeVideoCtx.font = '500 14px system-ui, sans-serif';
			realtimeVideoCtx.fillStyle = '#98accd';
			realtimeVideoCtx.fillText( 'Virtual follow camera based on ghost path and yaw.', 20, 58 );
		}

		function drawReplay() {
			ctx.clearRect( 0, 0, canvas.width, canvas.height );
			ctx.fillStyle = '#0a0f17';
			ctx.fillRect( 0, 0, canvas.width, canvas.height );

			if ( ! replay ) return;
			const samples = replay.ghost.samples || [];
			if ( samples.length < 2 ) return;

			const bounds = fitBounds( samples );
			if ( replayTrack && replayTrack.cells.length > 0 ) {
				for ( const [ gx, gz ] of replayTrack.cells ) {
					bounds.minX = Math.min( bounds.minX, gx * 7.4925 );
					bounds.maxX = Math.max( bounds.maxX, ( gx + 1 ) * 7.4925 );
					bounds.minZ = Math.min( bounds.minZ, gz * 7.4925 );
					bounds.maxZ = Math.max( bounds.maxZ, ( gz + 1 ) * 7.4925 );
				}
			}
			const w = bounds.maxX - bounds.minX;
			const h = bounds.maxZ - bounds.minZ;
			const sx = ( canvas.width * 0.86 ) / Math.max( w, 1 );
			const sy = ( canvas.height * 0.78 ) / Math.max( h, 1 );
			const scale = Math.min( sx, sy );
			const ox = canvas.width * 0.5 - ( bounds.minX + bounds.maxX ) * 0.5 * scale;
			const oy = canvas.height * 0.5 - ( bounds.minZ + bounds.maxZ ) * 0.5 * scale;
			const toPix = ( x, z ) => ( { x: x * scale + ox, y: z * scale + oy } );

			if ( replayTrack && replayTrack.cells.length > 0 ) {
				const cellSize = 9.99 * 0.75;
				for ( const [ gx, gz, tileType ] of replayTrack.cells ) {
					const color =
						tileType === 'track-finish' ? '#4ade80' :
						tileType === 'track-checkpoint' ? '#facc15' :
						tileType === 'track-corner' ? '#818cf8' :
						'#60a5fa';

					const x0 = gx * cellSize;
					const z0 = gz * cellSize;
					const p0 = toPix( x0, z0 );
					ctx.fillStyle = color;
					ctx.fillRect( p0.x, p0.y, cellSize * scale, cellSize * scale );
				}

				for ( const [ gx, gz, surfaceType ] of replayTrack.mods.u || [] ) {
					const x0 = gx * cellSize;
					const z0 = gz * cellSize;
					const p0 = toPix( x0, z0 );
					ctx.fillStyle =
						surfaceType === 'surface-ice' ? 'rgba(122,216,255,0.75)' :
						surfaceType === 'surface-boost' ? 'rgba(255,159,46,0.78)' :
						'rgba(184,134,87,0.75)';
					ctx.fillRect( p0.x + cellSize * scale * 0.16, p0.y + cellSize * scale * 0.16, cellSize * scale * 0.68, cellSize * scale * 0.68 );
				}

				ctx.strokeStyle = 'rgba(255,159,46,0.9)';
				ctx.lineWidth = 2;
				for ( const [ gx, gz ] of replayTrack.mods.j || [] ) {
					const x0 = gx * cellSize;
					const z0 = gz * cellSize;
					const p0 = toPix( x0, z0 );
					ctx.beginPath();
					ctx.moveTo( p0.x + cellSize * scale * 0.2, p0.y + cellSize * scale * 0.75 );
					ctx.lineTo( p0.x + cellSize * scale * 0.8, p0.y + cellSize * scale * 0.25 );
					ctx.stroke();
				}
			}

			ctx.strokeStyle = '#34435f';
			ctx.lineWidth = 3;
			ctx.beginPath();
			for ( let i = 0; i < samples.length; i ++ ) {
				const p = toPix( samples[ i ].x, samples[ i ].z );
				if ( i === 0 ) ctx.moveTo( p.x, p.y );
				else ctx.lineTo( p.x, p.y );
			}
			ctx.stroke();

			const nowT = ( pausedAt / 1000 );
			const car = getSampleAtTime( samples, nowT );
			if ( car ) {
				const p = toPix( car.x, car.z );
				ctx.fillStyle = '#67e8f9';
				ctx.beginPath();
				ctx.arc( p.x, p.y, 9, 0, Math.PI * 2 );
				ctx.fill();
			}

			ctx.fillStyle = '#dbe6ff';
			ctx.font = '600 24px system-ui, sans-serif';
			ctx.fillText( `${ replay.car || 'Car' } • ${ nowT.toFixed( 2 ) }s / ${ replay.ghost.duration.toFixed( 2 ) }s`, 20, 34 );
			const weatherPreset = replayTrack?.mods?.w?.preset || 'clear';
			const weatherPrecip = replayTrack?.mods?.w?.precipitation || 'none';
			const weatherIntensity = replayTrack?.mods?.w?.intensity || 'medium';
			const weatherWind = replayTrack?.mods?.w?.wind || 'none';
			ctx.font = '500 16px system-ui, sans-serif';
			ctx.fillStyle = '#9fd0ff';
			ctx.fillText( `Weather: ${ weatherPreset} • ${ weatherPrecip } • ${ weatherIntensity } • ${ weatherWind }`, 20, 58 );
			drawTelemetryGraph( nowT );
			drawRealtimeVideo( nowT );
			}

		function setReplay( parsed ) {
			if ( ! parsed || ! parsed.ghost || ! Array.isArray( parsed.ghost.samples ) || parsed.ghost.samples.length < 2 ) {
				statusEl.textContent = 'Invalid ghost payload.';
				return false;
			}
			replay = parsed;
			telemetry = buildTelemetry( replay.ghost.samples );
			replayTrack = null;
			try {
				if ( replay.url ) {
					const replayUrl = new URL( replay.url );
					const map = replayUrl.searchParams.get( 'map' );
					const mods = replayUrl.searchParams.get( 'mods' );
					replayTrack = { cells: decodeMapCells( map ), mods: decodeMods( mods ) };
				}
			} catch ( e ) {}
			pausedAt = 0;
			timeline.value = 0;
			isPlaying = false;
			playBtn.textContent = 'Play';
			const weather = replayTrack?.mods?.w || {};
			const weatherPreset = weather.preset || 'clear';
			const weatherSummary = `${ weather.precipitation || 'none' }, ${ weather.intensity || 'medium' }, ${ weather.wind || 'none' }${ weather.lightning ? ', lightning' : '' }`;
			statusEl.textContent = `Loaded ${ replay.ghost.samples.length } samples from ${ replay.url || 'unknown URL' } • Weather: ${ weatherPreset } (${ weatherSummary })`;
			drawReplay();
			drawTelemetryGraph( 0 );
			return true;
		}

		function loadFromTextarea() {
			try {
				const parsed = decodeBase64UrlJson( codeInput.value.trim() );
				setReplay( parsed );
			} catch ( e ) {
				statusEl.textContent = 'Could not decode ghost code.';
			}
		}

		function animate() {
			requestAnimationFrame( animate );
			if ( replay && isPlaying ) {
				const now = performance.now();
				const elapsed = now - playStartMs;
				const durationMs = Math.max( 1, replay.ghost.duration * 1000 );
				pausedAt = elapsed % durationMs;
				timeline.value = Math.round( ( pausedAt / durationMs ) * 1000 );
			}
			drawReplay();
			if ( ! replay ) {
				drawTelemetryGraph( 0 );
				drawRealtimeVideo( 0 );
			}
		}

		loadBtn.addEventListener( 'click', loadFromTextarea );
		playBtn.addEventListener( 'click', () => {
			if ( ! replay ) return;
			isPlaying = ! isPlaying;
			if ( isPlaying ) playStartMs = performance.now() - pausedAt;
			playBtn.textContent = isPlaying ? 'Pause' : 'Play';
		} );
		openRaceBtn.addEventListener( 'click', () => {
			if ( ! replay || ! replay.url || ! replay.ghost ) return;
			try {
				const blob = btoa( unescape( encodeURIComponent( JSON.stringify( replay.ghost ) ) ) ).replace( /\+/g, '-' ).replace( /\//g, '_' ).replace( /=+$/g, '' );
				const separator = replay.url.includes( '#' ) ? '&' : '#';
				window.open( `${ replay.url }${ separator }ghost=${ blob }`, '_blank' );
			} catch ( e ) {
				statusEl.textContent = 'Failed to open race URL.';
			}
		} );
		timeline.addEventListener( 'input', () => {
			if ( ! replay ) return;
			const durationMs = Math.max( 1, replay.ghost.duration * 1000 );
			pausedAt = ( Number( timeline.value ) / 1000 ) * durationMs;
			if ( isPlaying ) playStartMs = performance.now() - pausedAt;
		} );
		metricToggleInputs.forEach( ( input ) => {
			input.addEventListener( 'change', () => {
				const key = input.dataset.metric;
				if ( ! key ) return;
				metricVisibility[ key ] = Boolean( input.checked );
				drawTelemetryGraph( pausedAt / 1000 );
			} );
		} );

		const hashCode = readCodeFromHash();
		if ( hashCode ) {
			codeInput.value = hashCode;
			loadFromTextarea();
		}

		animate();
	</script>
</body>
</html>
