<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Replay Watcher</title>
	<style>
		body { margin: 0; background: #0e1118; color: #eaf0ff; font: 14px/1.4 system-ui, sans-serif; }
		.wrap { max-width: 980px; margin: 18px auto; padding: 0 14px; }
		.panel { background: #131925; border: 1px solid #273146; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
		.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
		button, input[type="text"], textarea, input[type="range"] {
			font: inherit;
			color: #eaf0ff;
			background: #0e141f;
			border: 1px solid #2a354a;
			border-radius: 8px;
			padding: 8px 10px;
		}
		button { cursor: pointer; background: #1d4ed8; border-color: #1d4ed8; }
		textarea { width: 100%; min-height: 76px; box-sizing: border-box; }
		iframe { width: 100%; height: 72vh; border-radius: 8px; border: 1px solid #2a354a; background: #0a0f17; }
		.meta { opacity: 0.85; }
	</style>
</head>
<body>
	<div class="wrap">
		<div class="panel">
			<div class="controls">
				<button id="load-code">Load Ghost Code</button>
				<button id="play-pause">Restart Replay</button>
				<button id="open-race">Open Race URL</button>
				<button id="switch-camera">Switch Camera</button>
				<div id="status" class="meta">No replay loaded.</div>
			</div>
			<div style="margin-top:8px">
				<textarea id="ghost-code" placeholder="Paste exported ghost code here..."></textarea>
			</div>
			<div id="camera-status" class="meta" style="margin-top:8px">Camera: chase</div>
		</div>

		<div class="panel">
			<iframe id="replay-frame" title="Replay preview"></iframe>
		</div>
	</div>

	<script>
		function decodeBase64UrlJson( value ) {
			const normalized = value.replace( /-/g, '+' ).replace( /_/g, '/' );
			const padLen = ( 4 - normalized.length % 4 ) % 4;
			const padded = normalized + '='.repeat( padLen );
			return JSON.parse( decodeURIComponent( escape( atob( padded ) ) ) );
		}

		const codeInput = document.getElementById( 'ghost-code' );
		const loadBtn = document.getElementById( 'load-code' );
		const openRaceBtn = document.getElementById( 'open-race' );
		const playBtn = document.getElementById( 'play-pause' );
		const switchCameraBtn = document.getElementById( 'switch-camera' );
		const cameraStatusEl = document.getElementById( 'camera-status' );
		const statusEl = document.getElementById( 'status' );
		const replayFrame = document.getElementById( 'replay-frame' );

		let replay = null;
		let currentCameraIndex = 0;
		const replayEditorCameraModes = [ 'chase', 'hood', 'overview' ];

		function readCodeFromHash() {
			const hash = new URLSearchParams( location.hash.startsWith( '#' ) ? location.hash.slice( 1 ) : location.hash );
			return hash.get( 'code' ) || '';
		}

		function updateCameraStatus() {
			cameraStatusEl.textContent = `Camera: ${ replayEditorCameraModes[ currentCameraIndex ] }`;
		}

		function buildReplayUrl( parsed ) {
			if ( ! parsed?.url || ! parsed?.ghost ) return '';
			const ghostBlob = btoa( unescape( encodeURIComponent( JSON.stringify( parsed.ghost ) ) ) ).replace( /\+/g, '-' ).replace( /\//g, '_' ).replace( /=+$/g, '' );
			const separator = parsed.url.includes( '#' ) ? '&' : '#';
			return `${ parsed.url }${ separator }ghost=${ ghostBlob }`;
		}

		function applyReplayToFrame( parsed ) {
			const replayUrl = buildReplayUrl( parsed );
			if ( ! replayUrl ) return false;
			replayFrame.src = replayUrl;
			return true;
		}

		function setReplay( parsed ) {
			if ( ! parsed || ! parsed.ghost || ! Array.isArray( parsed.ghost.samples ) || parsed.ghost.samples.length < 2 ) {
				statusEl.textContent = 'Invalid ghost payload.';
				return false;
			}
			replay = parsed;
			if ( ! applyReplayToFrame( replay ) ) {
				statusEl.textContent = 'Ghost URL is missing from replay data.';
				return false;
			}
			currentCameraIndex = 0;
			updateCameraStatus();
			statusEl.textContent = `Loaded ${ replay.ghost.samples.length } samples from ${ replay.url || 'unknown URL' }`;
			return true;
		}

		function loadFromTextarea() {
			try {
				const parsed = decodeBase64UrlJson( codeInput.value.trim() );
				setReplay( parsed );
			} catch ( e ) {
				statusEl.textContent = 'Could not decode ghost code.';
			}
		}

		loadBtn.addEventListener( 'click', loadFromTextarea );
		playBtn.addEventListener( 'click', () => {
			if ( ! replay ) return;
			applyReplayToFrame( replay );
		} );
		openRaceBtn.addEventListener( 'click', () => {
			if ( ! replay || ! replay.url || ! replay.ghost ) return;
			try {
				window.open( buildReplayUrl( replay ), '_blank' );
			} catch ( e ) {
				statusEl.textContent = 'Failed to open race URL.';
			}
		} );
		switchCameraBtn.addEventListener( 'click', () => {
			if ( ! replayFrame.contentWindow ) return;
			currentCameraIndex = ( currentCameraIndex + 1 ) % replayEditorCameraModes.length;
			const mode = replayEditorCameraModes[ currentCameraIndex ];
			replayFrame.contentWindow.postMessage( { type: 'racing:setCamera', mode }, window.location.origin );
			updateCameraStatus();
		} );

		replayFrame.addEventListener( 'load', () => {
			if ( ! replayFrame.contentWindow ) return;
			replayFrame.contentWindow.postMessage( { type: 'racing:setCameraModes', modes: replayEditorCameraModes }, window.location.origin );
			replayFrame.contentWindow.postMessage( { type: 'racing:setCamera', mode: replayEditorCameraModes[ currentCameraIndex ] }, window.location.origin );
		} );

		const hashCode = readCodeFromHash();
		if ( hashCode ) {
			codeInput.value = hashCode;
			loadFromTextarea();
		}

		updateCameraStatus();
	</script>
</body>
</html>
