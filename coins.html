<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Coin Rankings</title>
  <style>
    body{margin:0;background:#0b1220;color:#e8eefc;font:14px/1.45 system-ui,sans-serif}
    .wrap{max-width:860px;margin:0 auto;padding:20px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,.12);text-align:left}
    .muted{opacity:.75}
    a{color:#9fe8ff}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Global Coin Rankings</h1>
    <p class="muted">Top players by current coins (and best coins).</p>
    <div class="card">
      <div id="status">Loading…</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0">
        <input id="name-input" placeholder="Player name" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#111a2e;color:#e8eefc">
        <input id="coins-input" placeholder="Coins" type="number" min="0" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#111a2e;color:#e8eefc">
        <input id="records-input" placeholder="Records" type="number" min="0" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#111a2e;color:#e8eefc">
        <button id="submit-btn" style="padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.15);color:#fff;cursor:pointer">Submit score</button>
      </div>
      <table>
        <thead><tr><th>#</th><th>Player</th><th>Coins</th><th>Best Coins</th><th>Records</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <p><a href="index.html">Back to game</a></p>
  </div>
  <script>
    const COINS_API_BASE = 'https://racing-coins-api.ga1010.workers.dev/api/coins';
    const statusEl = document.getElementById('status');
    const rowsEl = document.getElementById('rows');

    async function load() {
      try {
        const res = await fetch(`${COINS_API_BASE}/top`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const entries = Array.isArray(data?.entries) ? data.entries : [];
        rowsEl.innerHTML = '';
        entries.forEach((entry, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${idx + 1}</td><td>${entry.name || 'Unknown'}</td><td>${entry.coins || 0}</td><td>${entry.bestCoins || 0}</td><td>${entry.records || 0}</td>`;
          rowsEl.appendChild(tr);
        });
        statusEl.textContent = entries.length > 0 ? `Loaded ${entries.length} players.` : 'No players submitted yet.';
      } catch (e) {
        statusEl.textContent = 'Failed to load rankings (check Coins Worker URL/deploy).';
      }
    }

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const name = document.getElementById('name-input').value.trim();
      const coins = Number(document.getElementById('coins-input').value || 0);
      const records = Number(document.getElementById('records-input').value || 0);
      try {
        const res = await fetch(`${COINS_API_BASE}/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, coins, records }),
        });
        const data = await res.json();
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
        statusEl.textContent = 'Submitted! Refreshing…';
        load();
      } catch (e) {
        statusEl.textContent = `Submit failed: ${e.message}`;
      }
    });

    load();
  </script>
</body>
</html>
