<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Racing</title>
	<style>
		body { margin: 0; overflow: hidden; background: #000; }
		canvas { display: block; touch-action: none; }
		#editor-link, #respawnBtn, #car-select, #share-time-btn, #export-ghost-btn, #import-ghost-btn, #ai-toggle-btn {
			position: absolute;
			bottom: 12px;
			color: #fff;
			font: 14px sans-serif;
			background: rgba(0,0,0,0.5);
			padding: 8px 14px;
			border-radius: 6px;
			z-index: 10;
			border: none;
		}
		#editor-link, #respawnBtn { text-decoration: none; }
		#editor-link { right: 16px; }
		#respawnBtn { left: 16px; top: 54px; bottom: auto; }
		#car-select { left: 16px; top: 12px; bottom: auto; }
		#share-time-btn { left: 16px; bottom: 12px; }
		#ai-toggle-btn { left: 430px; bottom: 12px; cursor: pointer; }
		#export-ghost-btn { left: 180px; bottom: 12px; }
		#import-ghost-btn { left: 300px; bottom: 12px; }
		#share-time-btn, #export-ghost-btn, #import-ghost-btn { cursor: pointer; }
		#editor-link:hover, #respawnBtn:hover, #car-select:hover, #share-time-btn:hover, #export-ghost-btn:hover, #import-ghost-btn:hover, #ai-toggle-btn:hover { background: rgba(0,0,0,0.7); }
		#share-time-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
		#lap-hud {
			position: absolute;
			top: 12px;
			left: 50%;
			transform: translateX(-50%);
			color: #fff;
			font: 600 14px/1.4 sans-serif;
			text-align: center;
			text-shadow: 0 1px 3px rgba(0,0,0,0.7);
			background: rgba(0,0,0,0.4);
			border-radius: 8px;
			padding: 8px 12px;
			z-index: 10;
		}
		#economy-hud {
			position: absolute;
			top: 12px;
			right: 12px;
			color: #fff;
			font: 600 13px/1.35 sans-serif;
			text-align: right;
			background: rgba(0,0,0,0.4);
			border-radius: 8px;
			padding: 8px 10px;
			z-index: 10;
		}
		#buy-upgrade {
			margin-top: 6px;
			background: rgba(255,255,255,0.16);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.22);
			border-radius: 6px;
			padding: 4px 8px;
			font: 600 12px sans-serif;
			cursor: pointer;
		}
		#buy-upgrade:disabled {
			opacity: 0.55;
			cursor: not-allowed;
		}
		@media (pointer: coarse) {
			#editor-link { bottom: auto; top: 12px; right: 12px; }
			#car-select { top: 12px; left: 12px; }
			#respawnBtn { top: 54px; left: 12px; }
			#lap-hud { top: 56px; }
			#economy-hud { top: 12px; right: 12px; }
		}
	</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
			"crashcat": "https://esm.sh/crashcat@0.0.2"
		}
	}
	</script>
</head>
<body>
	<a id="editor-link" href="editor.html">Create your own track</a>
	<select id="car-select" aria-label="Select car">
		<option value="vehicle-truck-yellow">Yellow</option>
		<option value="vehicle-truck-green">Green</option>
		<option value="vehicle-truck-purple">Purple</option>
		<option value="vehicle-truck-red">Red</option>
	</select>
		<div id="lap-hud">Lap 1 • 00:00.000<br><small>Last: --:--.--- • Best: --:--.---</small><br><small>Checkpoints: 0 / 0</small></div>
		<div id="economy-hud">
		<div id="coins-label">Coins: 0</div>
		<div id="upgrade-label">Engine: x1.20</div>
		<button id="buy-upgrade">Buy Upgrade</button>
	</div>
	<a id="respawnBtn" href="#" role="button">Respawn</a>
	<button id="share-time-btn" type="button" disabled>Share best time</button>
	<button id="export-ghost-btn" type="button">Export ghost</button>
	<button id="import-ghost-btn" type="button">Import ghost</button>
	<button id="ai-toggle-btn" type="button">AI: ON</button>
	<script>
		const map = new URLSearchParams( location.search ).get( 'map' );
		const mods = new URLSearchParams( location.search ).get( 'mods' );
		if ( map ) {
			const link = document.getElementById( 'editor-link' );
			link.href = 'editor.html?map=' + map + ( mods ? '&mods=' + mods : '' );
			link.textContent = 'Edit this track';
		}
	</script>
	<script type="module" src="js/main.js"></script>
</body>
</html>
