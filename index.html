<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Racing</title>
	<style>
		body { margin: 0; overflow: hidden; background: #000; }
		canvas { display: block; touch-action: none; }
		#editor-link, #totd-link, #replay-link, #split-link, #respawnBtn, #car-select, #share-time-btn, #export-ghost-btn, #import-ghost-btn {
			position: absolute;
			bottom: 12px;
			color: #fff;
			font: 14px sans-serif;
			background: rgba(0,0,0,0.5);
			padding: 8px 14px;
			border-radius: 6px;
			z-index: 10;
			border: none;
		}
		#editor-link, #totd-link, #replay-link, #split-link, #respawnBtn { text-decoration: none; }
		#editor-link { right: 16px; }
		#totd-link { right: 16px; bottom: 54px; }
		#replay-link { right: 16px; bottom: 96px; }
		#split-link { right: 16px; bottom: 138px; }
		#respawnBtn { left: 16px; top: 54px; bottom: auto; }
		#car-select { left: 16px; top: 12px; bottom: auto; }
		#share-time-btn { left: 16px; bottom: 12px; }
		#export-ghost-btn { left: 180px; bottom: 12px; }
		#import-ghost-btn { left: 300px; bottom: 12px; }
		#share-time-btn, #export-ghost-btn, #import-ghost-btn { cursor: pointer; }
		#editor-link:hover, #totd-link:hover, #replay-link:hover, #split-link:hover, #respawnBtn:hover, #car-select:hover, #share-time-btn:hover, #export-ghost-btn:hover, #import-ghost-btn:hover { background: rgba(0,0,0,0.7); }
		#share-time-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
		#lap-hud {
			position: absolute;
			top: 12px;
			left: 50%;
			transform: translateX(-50%);
			color: #fff;
			font: 600 14px/1.4 sans-serif;
			text-align: center;
			text-shadow: 0 1px 3px rgba(0,0,0,0.7);
			background: rgba(0,0,0,0.4);
			border-radius: 8px;
			padding: 8px 12px;
			z-index: 10;
		}
		#lap-hud-2 {
			position: absolute;
			left: 50%;
			top: calc(50% + 12px);
			transform: translateX(-50%);
			color: #fff;
			font: 600 14px/1.4 sans-serif;
			text-align: center;
			text-shadow: 0 1px 3px rgba(0,0,0,0.7);
			background: rgba(0,0,0,0.4);
			border-radius: 8px;
			padding: 8px 12px;
			z-index: 10;
			display: none;
		}
		#economy-hud {
			position: absolute;
			top: 12px;
			right: 12px;
			color: #fff;
			font: 600 13px/1.35 sans-serif;
			text-align: right;
			background: rgba(0,0,0,0.4);
			border-radius: 8px;
			padding: 8px 10px;
			z-index: 10;
		}
		#buy-upgrade {
			margin-top: 6px;
			background: rgba(255,255,255,0.16);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.22);
			border-radius: 6px;
			padding: 4px 8px;
			font: 600 12px sans-serif;
			cursor: pointer;
		}
		#buy-upgrade:disabled {
			opacity: 0.55;
			cursor: not-allowed;
		}
		#mode-menu {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: rgba(10, 14, 22, 0.85);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.2);
			border-radius: 12px;
			padding: 14px;
			z-index: 20;
			min-width: 240px;
			display: none;
			font: 600 13px/1.4 sans-serif;
		}
		#mode-menu h3 { margin: 0 0 10px; font: 700 16px sans-serif; }
		#mode-menu button {
			width: 100%;
			margin-top: 8px;
			padding: 9px 10px;
			border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.2);
			background: rgba(255,255,255,0.1);
			color: #fff;
			cursor: pointer;
			font: 600 13px sans-serif;
		}
		#mode-menu button:hover { background: rgba(255,255,255,0.18); }
		#stunt-points {
			position: absolute;
			top: 12px;
			left: 50%;
			transform: translateX(-50%);
			color: #ffd979;
			font: 700 20px/1.2 sans-serif;
			background: rgba(0,0,0,0.45);
			border-radius: 10px;
			padding: 8px 14px;
			z-index: 11;
			display: none;
			text-shadow: 0 1px 3px rgba(0,0,0,0.6);
		}
		@media (pointer: coarse) {
			#editor-link { bottom: auto; top: 12px; right: 12px; }
			#totd-link { bottom: auto; top: 54px; right: 12px; }
			#replay-link { bottom: auto; top: 96px; right: 12px; }
			#split-link { bottom: auto; top: 138px; right: 12px; }
			#car-select { top: 12px; left: 12px; }
			#respawnBtn { top: 54px; left: 12px; }
			#lap-hud { top: 56px; }
			#economy-hud { top: 12px; right: 12px; }
		}
	</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
			"crashcat": "https://esm.sh/crashcat@0.0.2"
		}
	}
	</script>
</head>
<body>
	<a id="editor-link" href="editor.html">Create your own track</a>
	<a id="totd-link" href="totd.html">Track of the day</a>
	<a id="replay-link" href="replay.html">Replay watcher</a>
	<a id="split-link" href="#">2P split screen</a>
	<select id="car-select" aria-label="Select car">
		<option value="vehicle-truck-yellow">Yellow</option>
		<option value="vehicle-truck-green">Green</option>
		<option value="vehicle-truck-purple">Purple</option>
		<option value="vehicle-truck-red">Red</option>
	</select>
		<div id="lap-hud">Lap 1 • 00:00.000<br><small>Last: --:--.--- • Best: --:--.---</small><br><small>Checkpoints: 0 / 0</small></div>
		<div id="lap-hud-2">P2 • Lap 1 • 00:00.000<br><small>Last: --:--.--- • Best: --:--.---</small><br><small>Keys: Arrows</small></div>
	<div id="economy-hud">
		<div id="coins-label">Coins: 0</div>
		<div id="upgrade-label">Engine: x1.20</div>
		<button id="buy-upgrade">Buy Upgrade</button>
	</div>
	<div id="stunt-points">Points: 0</div>
	<div id="mode-menu">
		<h3>Game Mode (E)</h3>
		<button id="mode-race-btn" type="button">Race Mode</button>
		<button id="mode-stunt-btn" type="button">Stunt Mode</button>
	</div>
	<a id="respawnBtn" href="#" role="button">Respawn</a>
	<button id="share-time-btn" type="button" disabled>Share best time</button>
	<button id="export-ghost-btn" type="button">Export ghost</button>
	<button id="import-ghost-btn" type="button">Import ghost</button>
	<script>
		const map = new URLSearchParams( location.search ).get( 'map' );
		const mods = new URLSearchParams( location.search ).get( 'mods' );
		const multiplayer = new URLSearchParams( location.search ).get( 'multiplayer' );
		if ( map ) {
			const link = document.getElementById( 'editor-link' );
			link.href = 'editor.html?map=' + map + ( mods ? '&mods=' + mods : '' );
			link.textContent = 'Edit this track';
		}
		const splitLink = document.getElementById( 'split-link' );
		const splitParams = new URLSearchParams( location.search );
		if ( multiplayer === '1' ) {
			splitParams.delete( 'multiplayer' );
			splitLink.textContent = 'Single player';
		} else {
			splitParams.set( 'multiplayer', '1' );
			splitLink.textContent = '2P split screen';
		}
		splitLink.href = `${ location.pathname }?${ splitParams.toString() }${ location.hash || '' }`;
	</script>
	<script type="module" src="js/main.js"></script>
</body>
</html>
