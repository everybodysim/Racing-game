<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Season Hub</title>
  <style>
    body{margin:0;background:#0a1020;color:#e6eeff;font:14px/1.45 system-ui,sans-serif}
    .wrap{max-width:940px;margin:0 auto;padding:20px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px}
    table{width:100%;border-collapse:collapse}
    td,th{padding:7px;border-bottom:1px solid rgba(255,255,255,.12);text-align:left}
    .muted{opacity:.78}
    a{color:#9fe8ff}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Season Hub</h1>
    <p class="muted">TOTD-style seasonal tracks (12) + records board. Most records wins the prize pool.</p>
    <div class="grid">
      <div class="card">
        <h3>Current season seed</h3>
        <div id="season-status">Loading season…</div>
        <ul id="season-data"></ul>
      </div>
      <div class="card">
        <h3>Season records board</h3>
        <div class="muted">Submit your season record count; #1 wins the pool.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0">
          <input id="name-input" placeholder="Player name" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#101830;color:#e6eeff">
          <input id="records-input" type="number" min="0" placeholder="Records" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#101830;color:#e6eeff">
          <button id="submit-record-btn" style="padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.16);color:#fff;cursor:pointer">Submit</button>
        </div>
        <table>
          <thead><tr><th>Place</th><th>Player</th><th>Records</th><th>Reward if season ends now</th></tr></thead>
          <tbody id="reward-rows"></tbody>
        </table>
      </div>
    </div>
    <p><a href="index.html">Back to game</a></p>
  </div>

  <script>
    const SEASON_API = 'https://racing-season-api.ga1010.workers.dev/api/season/current';
    const SEASON_BOARD_API = 'https://racing-season-api.ga1010.workers.dev/api/season/board';
    const SEASON_SUBMIT_API = 'https://racing-season-api.ga1010.workers.dev/api/season/record';

    const seasonStatus = document.getElementById('season-status');
    const seasonData = document.getElementById('season-data');
    const rewardRows = document.getElementById('reward-rows');

    async function loadSeasonHub() {
      try {
        const seasonRes = await fetch(SEASON_API);
        if (!seasonRes.ok) throw new Error(`Season API ${seasonRes.status}`);
        const season = await seasonRes.json();
        if (season?.ok === false) throw new Error(season.error || 'Season API failed');

        seasonStatus.textContent = `Season ${season.seasonId} ready.`;
        seasonData.innerHTML = `
          <li>Season ID: <strong>${season.seasonId}</strong></li>
          <li>Season seed: <strong>${season.seasonSeed}</strong></li>
          <li>Daily seed: <strong>${season.daySeed}</strong></li>
          <li>Reward pool: <strong>${season.rewardPool} coins</strong></li>
          <li>Winner rule: <strong>Most records in this season board</strong></li>
        `;
        const tracksHtml = (season.trackSeeds || []).map((entry) =>
          `<li>#${entry.slot} — seed ${entry.seed} — <a href="${entry.playUrl}" target="_blank" rel="noopener noreferrer">${entry.label}</a></li>`
        ).join('');
        seasonData.innerHTML += `<li><strong>Season Tracks (12)</strong><ol>${tracksHtml}</ol></li>`;

        const boardRes = await fetch(`${SEASON_BOARD_API}?seasonId=${encodeURIComponent(season.seasonId)}`);
        if (!boardRes.ok) throw new Error(`Season board API ${boardRes.status}`);
        const boardData = await boardRes.json();
        const entries = Array.isArray(boardData?.entries) ? boardData.entries : [];
        const top = entries.slice(0, 10);
        rewardRows.innerHTML = '';
        const splits = [0.6,0.2,0.1,0.05,0.03,0.02,0,0,0,0];
        top.forEach((entry, i) => {
          const reward = Math.round((season.rewardPool || 0) * (splits[i] || 0));
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>#${i+1}</td><td>${entry.name || 'Unknown'}</td><td>${entry.records || 0}</td><td>${reward}</td>`;
          rewardRows.appendChild(tr);
        });
        if (!top.length) rewardRows.innerHTML = '<tr><td colspan="4">No records submitted yet.</td></tr>';
      } catch (e) {
        seasonStatus.textContent = `Failed to load season hub: ${e.message}`;
      }
    }

    document.getElementById('submit-record-btn').addEventListener('click', async () => {
      const seasonRes = await fetch(SEASON_API);
      const season = await seasonRes.json();
      const seasonId = season?.seasonId;
      const name = document.getElementById('name-input').value.trim();
      const records = Number(document.getElementById('records-input').value || 0);
      if (!seasonId || !name) return;
      try {
        const res = await fetch(SEASON_SUBMIT_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ seasonId, name, records }),
        });
        const data = await res.json();
        if (!res.ok || data?.ok === false) throw new Error(data?.error || `HTTP ${res.status}`);
        seasonStatus.textContent = 'Record submitted. Refreshing board…';
        loadSeasonHub();
      } catch (e) {
        seasonStatus.textContent = `Submit failed: ${e.message}`;
      }
    });

    loadSeasonHub();
  </script>
</body>
</html>
